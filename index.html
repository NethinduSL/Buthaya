<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Buthaya – The Mind Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04050f;--surface:rgba(255,255,255,.045);--border:rgba(160,110,255,.28);
  --accent:#a066ff;--gold:#ffe080;--text:#e8dcff;--muted:rgba(200,170,255,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);font-family:'EB Garamond',Georgia,serif;color:var(--text);min-height:100dvh;overflow-x:hidden}
#bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 90% 60% at 50% -5%,#1e0a48 0%,transparent 65%),radial-gradient(ellipse 55% 45% at 10% 95%,#0d0430 0%,transparent 65%),radial-gradient(ellipse 40% 35% at 90% 80%,#0a0228 0%,transparent 60%),#04050f}
canvas#stars{position:fixed;inset:0;z-index:1;pointer-events:none}
#app{position:relative;z-index:2;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:max(env(safe-area-inset-top),1.2rem) 1rem max(env(safe-area-inset-bottom),2rem)}

header{text-align:center;margin-bottom:.8rem;padding-top:.3rem}
.brand{font-family:'Cinzel Decorative',serif;font-weight:700;font-size:clamp(1.45rem,7vw,2.4rem);color:var(--gold);letter-spacing:.1em;text-shadow:0 0 35px rgba(200,130,40,.6),0 0 70px rgba(140,70,220,.35)}
.sub{font-size:clamp(.6rem,2vw,.78rem);letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin-top:.3rem}

.orb-wrap{width:clamp(92px,22vw,130px);height:clamp(92px,22vw,130px);margin:1rem 0;position:relative}
.orb-ring{position:absolute;inset:-14px;border-radius:50%;background:conic-gradient(from 0deg,#a066ff,#ff77cc,#55ccff,#66ffcc,#a066ff);animation:spinRing 6s linear infinite;opacity:.18;filter:blur(8px)}
.orb{position:relative;width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 36% 30%,#cc99ff 0%,#6030c0 42%,#160838 100%);box-shadow:0 0 50px rgba(140,60,255,.55),inset 0 0 25px rgba(200,140,255,.15)}
.orb-eye{width:38%;opacity:.8}

.think-label{text-align:center;font-style:italic;color:var(--muted);font-size:clamp(.85rem,3.2vw,1rem);margin-bottom:.9rem;min-height:1.4rem}
.dots span{animation:dotBounce 1.3s infinite;display:inline-block}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:clamp(1.1rem,4vw,1.8rem) clamp(1rem,3.5vw,1.6rem);width:100%;max-width:560px;text-align:center;backdrop-filter:blur(10px)}
.q-meta{font-size:.75rem;color:var(--muted);letter-spacing:.12em;margin-bottom:.5rem;text-transform:uppercase}
.q-text{font-size:clamp(1.05rem,4.1vw,1.28rem);line-height:1.5;color:var(--text)}

.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:1.3rem}
.ans-btn{padding:clamp(.75rem,2.5vw,1rem) .5rem;border-radius:12px;border:1px solid;font-family:'EB Garamond',serif;font-size:clamp(.85rem,3vw,.98rem);cursor:pointer;transition:all .18s}
.ans-btn:hover{transform:translateY(-3px);filter:brightness(1.2)}
.btn-yes{background:rgba(38,166,91,.15);border-color:#26a65b;color:#90ffb8}
.btn-no{background:rgba(192,57,43,.15);border-color:#c0392b;color:#ffaaaa}
.btn-prob{background:rgba(80,160,100,.12);border-color:rgba(80,200,100,.35);color:#b8ffcc}
.btn-probn{background:rgba(180,80,60,.12);border-color:rgba(200,100,80,.35);color:#ffd0c0}
.btn-dk{background:rgba(120,100,160,.12);border-color:rgba(160,130,220,.35);color:#c8b8ff;grid-column:1/-1}

.prog-wrap{margin-top:1.2rem}
.prog-track{height:4px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .6s ease}

.guess-name{font-family:'Cinzel Decorative',serif;font-size:clamp(1.2rem,5.5vw,1.85rem);color:var(--gold);margin:0.6rem 0 .4rem}
.result-icon{font-size:2.6rem;margin-bottom:.5rem}
.result-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.1rem,4.5vw,1.45rem);color:var(--gold)}
.btn-primary{padding:.85rem 2.2rem;border-radius:14px;background:linear-gradient(135deg,rgba(140,60,220,.7),rgba(100,40,180,.7));border:1px solid rgba(180,120,255,.6);color:#e8d0ff;font-size:clamp(.92rem,3.2vw,1.05rem);cursor:pointer;margin-top:.5rem}

.reveal-img-container {
  margin: 1.2rem auto;
  width: 100%;
  max-width: 280px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,.6);
  border: 2px solid rgba(255,200,80,.35);
}

@media (min-width: 600px) {
  #app { padding: 2rem 1.5rem 3rem; }
  .card { padding: 1.8rem 2rem; }
  .ans-grid { gap: .9rem; }
  .q-text { font-size: 1.32rem; line-height: 1.45; }
  .reveal-img-container { max-width: 320px; }
}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="stars"></canvas>
<div id="app">
  <header>
    <div class="brand">BUTHAYA</div>
    <div class="sub">The Mind Reader</div>
  </header>
  <div class="orb-wrap" id="orb">
    <div class="orb-ring"></div>
    <div class="orb">
      <div class="orb-particles" id="orbParticles"></div>
      <svg class="orb-eye" viewBox="0 0 48 48" fill="none">
        <ellipse cx="24" cy="25" rx="10" ry="7" fill="rgba(200,160,255,0.18)"/>
        <path d="M14 25c0-5.52 4.48-10 10-10s10 4.48 10 10" stroke="rgba(200,160,255,0.5)" stroke-width="1.5" fill="none"/>
        <circle cx="24" cy="25" r="4.5" fill="rgba(220,180,255,0.35)"/>
        <circle cx="25.5" cy="23.5" r="1.5" fill="rgba(255,255,255,0.65)"/>
      </svg>
    </div>
  </div>
  <div class="think-label" id="thinkLabel"></div>
  <div id="game"></div>
</div>

<script>
// Logical Question Tree for first 10 questions
const QUESTION_TREE = {
  animal: [
    "Is it a living animal?",
    "Does it have four legs?",
    "Is it bigger than a cat?",
    "Can it fly?",
    "Does it live mostly in water?",
    "Is it a mammal?",
    "Does it have fur or hair?",
    "Is it commonly kept as a pet?",
    "Does it eat meat?",
    "Is it dangerous to humans?"
  ],
  item: [
    "Is it something you can hold?",
    "Is it used indoors?",
    "Is it electronic?",
    "Does it need electricity or batteries?",
    "Is it found in the kitchen?",
    "Can it fit in your pocket?",
    "Is it used for entertainment?",
    "Is it made mostly of metal or plastic?",
    "Is it used every day?",
    "Is it wearable?"
  ],
  character: [
    "Is the character human?",
    "Is the character from a movie or TV show?",
    "Is the character animated or cartoon?",
    "Is the character a hero?",
    "Does the character have special powers?",
    "Is the character from a video game?",
    "Is the character a villain?",
    "Does the character wear a special costume?",
    "Is the character from a book?",
    "Is the character famous all over the world?"
  ]
};

let category = null;
let answers = [];
let currentQuestionIndex = 0;
let done = false;
const MAX_Q = 18;

const orbWrap = document.getElementById('orb');
const thinkLabel = document.getElementById('thinkLabel');
const gameEl = document.getElementById('game');

function setOrb(state, msg){
  orbWrap.className = 'orb-wrap ' + (state || '');
  thinkLabel.innerHTML = msg ? `${msg} <span class="dots"><span>.</span><span>.</span><span>.</span></span>` : '';
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showIntro(){
  category = null; answers = []; currentQuestionIndex = 0; done = false;
  setOrb('', '');
  gameEl.innerHTML = `
    <div class="card">
      <p class="intro-text" style="font-size:1.08rem;line-height:1.75">Think of any animal, character,<br>or object.</p>
      <div style="margin:1.4rem 0 .8rem;display:flex;flex-wrap:wrap;gap:10px;justify-content:center">
        <button class="btn-primary" onclick="startCategory('animal')">Animal</button>
        <button class="btn-primary" onclick="startCategory('character')">Character</button>
        <button class="btn-primary" onclick="startCategory('item')">Object / Thing</button>
      </div>
    </div>
  `;
}

function startCategory(cat){
  category = cat;
  answers = [];
  currentQuestionIndex = 0;
  done = false;
  setOrb('thinking', 'Reading your mind');
  setTimeout(askNextQuestion, 650);
}

function askNextQuestion(){
  if (done) return;

  if (currentQuestionIndex < 10) {
    // Use logical tree for first 10
    const qList = QUESTION_TREE[category];
    const question = qList[currentQuestionIndex];
    showQuestion(question);
  } 
  else if (currentQuestionIndex < MAX_Q) {
    // After 10 questions, use AI for smarter follow-ups
    generateAIQuestion();
  } 
  else {
    doGuess();
  }
}

function showQuestion(question){
  const num = answers.length + 1;
  const pct = Math.round((num / MAX_Q) * 100);

  gameEl.innerHTML = `
    <div class="card">
      <div class="q-meta">${category.toUpperCase()} — Question ${num} of ${MAX_Q}</div>
      <div class="q-text">${esc(question)}</div>
      <div class="ans-grid">
        <button class="ans-btn btn-yes" onclick="answer('${esc(question)}','Yes')">Yes</button>
        <button class="ans-btn btn-no" onclick="answer('${esc(question)}','No')">No</button>
        <button class="ans-btn btn-prob" onclick="answer('${esc(question)}','Probably')">Probably</button>
        <button class="ans-btn btn-probn" onclick="answer('${esc(question)}','Probably not')">Probably not</button>
        <button class="ans-btn btn-dk" onclick="answer('${esc(question)}','I don\\'t know')">I don't know</button>
      </div>
      <div class="prog-wrap">
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
  `;
  setOrb('', '');
}

function answer(q, ans){
  answers.push({q: q, a: ans});
  currentQuestionIndex++;
  setOrb('thinking', 'Understanding...');
  setTimeout(askNextQuestion, 500);
}

async function generateAIQuestion(){
  setOrb('thinking', 'Thinking deeper');

  let history = answers.map(a => `${a.q} → ${a.a}`).join('\n');

  const prompt = `You are Buthaya continuing a simple 20 Questions game.
Category: ${category}

Previous answers:
${history}

Ask ONE new short, simple yes/no question.
Do not repeat any previous questions.
Use very easy words.`;

  try {
    const res = await fetch(`https://bit-x-apis.vercel.app/talkai?q=${encodeURIComponent(prompt)}`);
    const data = await res.json();
    let q = (data.response || '').trim();

    if (q.length > 110 || answers.some(a => a.q.toLowerCase() === q.toLowerCase())) {
      q = "Is it something people see every day?";
    }

    showQuestion(q);
  } catch(e) {
    showQuestion("Is it something people see every day?");
  }
}

function buildGuessPrompt(){
  let history = answers.map(a => `${a.q} → ${a.a}`).join('\n');
  return `Guess what the player is thinking of. It is a ${category}.

Answers:
${history}

Reply with ONLY the most likely name (1-4 words). No extra text.`;
}

async function doGuess(){
  if (done) return;
  done = true;
  setOrb('guessing', 'Revealing...');
  gameEl.innerHTML = `<div class="thinking">Buthaya sees the answer...</div>`;

  try {
    const res = await fetch(`https://bit-x-apis.vercel.app/talkai?q=${encodeURIComponent(buildGuessPrompt())}`);
    const data = await res.json();
    let name = (data.response || 'Mystery').trim().replace(/^(it is |this is |guess:)/i,'').trim();
    showGuess(name);
  } catch(e) {
    showGuess("Something special");
  }
}

function showGuess(name){
  setOrb('', '');
  const imgUrl = `https://bit-x-apis.vercel.app/aiimg2?q=${encodeURIComponent(name)}`;

  gameEl.innerHTML = `
    <div class="card">
      <div style="font-size:0.96rem;color:var(--muted)">I believe it is...</div>
      <div class="guess-name">${esc(name)}</div>
      
      <div class="reveal-img-container" id="imgSlot">
        <div style="height:240px;background:rgba(160,100,255,0.08);display:flex;align-items:center;justify-content:center;font-size:4.5rem">🔮</div>
      </div>

      <div style="margin:1.2rem 0 .8rem;color:var(--muted)">Was I correct?</div>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
        <button class="ans-btn btn-yes" onclick="winGame('${esc(name)}')">Yes! That's it</button>
        <button class="ans-btn btn-no" onclick="tryAgain('${esc(name)}')">No, try again</button>
      </div>
    </div>
  `;

  const img = new Image();
  img.onload = () => {
    const slot = document.getElementById('imgSlot');
    if (slot) slot.innerHTML = `<img src="${imgUrl}" style="width:100%;height:auto;display:block">`;
  };
  img.src = imgUrl;
}

async function tryAgain(wrong){
  answers.push({q: `Is it ${wrong}?`, a: 'No'});
  currentQuestionIndex++;
  done = false;
  setOrb('thinking', 'Searching deeper...');
  setTimeout(doGuess, 700);
}

function winGame(name){
  done = true;
  setOrb('', '');
  gameEl.innerHTML = `
    <div class="card">
      <span class="result-icon">🎉</span>
      <div class="result-title">Buthaya read your mind!</div>
      <div class="guess-name">${esc(name)}</div>
      <div style="margin:1.2rem 0;color:#b0ffcc">Your thoughts are clear to me now.</div>
      <button class="btn-primary" onclick="showIntro()">Play Again</button>
    </div>
  `;
}

showIntro();
</script>
</body>
</html>
